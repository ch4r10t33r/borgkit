name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write       # create GitHub releases + push version commit
  issues: write         # comment on issues when included in a release
  pull-requests: write  # comment on PRs when included in a release
  id-token: write       # OIDC provenance for npm publish
  actions: write        # dispatch release-cli.yml after semantic-release

jobs:
  release:
    name: Semantic release & npm publish
    runs-on: ubuntu-latest
    # Skip the release commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: Checkout (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx semantic-release
          # Check if semantic-release pushed a new tag (i.e. a release was made)
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          LATEST_TAG_COMMIT=$(git rev-list -n1 "$LATEST_TAG" 2>/dev/null || echo "")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$LATEST_TAG_COMMIT" = "$HEAD_COMMIT" ] || git log --oneline -3 | grep -q "chore(release)"; then
            VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
            echo "released=true"  >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version="       >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Release CLI (build & publish binaries)
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-cli.yml --ref "v${{ steps.semantic.outputs.version }}"
          echo "Triggered release-cli.yml for v${{ steps.semantic.outputs.version }}"
